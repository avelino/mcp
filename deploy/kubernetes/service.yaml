apiVersion: v1
kind: Service
metadata:
  name: mcp-proxy
  namespace: mcp
  labels:
    app.kubernetes.io/name: mcp-proxy
    app.kubernetes.io/component: proxy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mcp-proxy
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
