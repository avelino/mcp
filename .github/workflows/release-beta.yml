name: Release Beta

on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

permissions:
  contents: write
  packages: write

jobs:
  build:
    if: github.event.workflow_run.conclusion == 'success'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
          - target: x86_64-apple-darwin
            os: macos-15-large
            cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build with cross
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename binary (unix)
        if: runner.os != 'Windows'
        run: mv target/${{ matrix.target }}/release/mcp mcp-${{ matrix.target }}

      - name: Rename binary (windows)
        if: runner.os == 'Windows'
        run: mv target/${{ matrix.target }}/release/mcp.exe mcp-${{ matrix.target }}.exe

      - name: Upload artifact (unix)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: mcp-${{ matrix.target }}
          path: mcp-${{ matrix.target }}

      - name: Upload artifact (windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: mcp-${{ matrix.target }}
          path: mcp-${{ matrix.target }}.exe

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release
        id: prep
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          TAG="v${VERSION}-beta+${SHA}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Delete previous beta releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --json tagName,isPrerelease -q '.[] | select(.isPrerelease) | .tagName' | while read -r tag; do
            if echo "$tag" | grep -q "beta"; then
              gh release delete "$tag" --yes --cleanup-tag || true
            fi
          done

      - name: Create beta release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Collect all binaries
          FILES=()
          for dir in artifacts/mcp-*/; do
            for file in "$dir"*; do
              [ -f "$file" ] && FILES+=("$file")
            done
          done

          gh release create "${{ steps.prep.outputs.tag }}" \
            --prerelease \
            --title "Beta ${{ steps.prep.outputs.tag }}" \
            --notes "Automated beta build from main branch (commit ${{ github.event.workflow_run.head_sha }})" \
            "${FILES[@]}"

  docker:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare version
        id: prep
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHA=$(echo "${{ github.event.workflow_run.head_sha }}" | cut -c1-7)
          echo "tag=${VERSION}-beta.${SHA}" >> "$GITHUB_OUTPUT"

      - name: Prepare Docker contexts
        run: |
          mkdir -p docker-amd64 docker-arm64
          cp artifacts/mcp-x86_64-unknown-linux-gnu/mcp-x86_64-unknown-linux-gnu docker-amd64/mcp
          cp artifacts/mcp-aarch64-unknown-linux-gnu/mcp-aarch64-unknown-linux-gnu docker-arm64/mcp
          chmod +x docker-amd64/mcp docker-arm64/mcp
          cp Dockerfile docker-amd64/
          cp Dockerfile docker-arm64/

      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: docker-amd64
          platforms: linux/amd64
          push: true
          tags: ghcr.io/avelino/mcp:${{ steps.prep.outputs.tag }}-amd64
          provenance: false

      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: docker-arm64
          platforms: linux/arm64
          push: true
          tags: ghcr.io/avelino/mcp:${{ steps.prep.outputs.tag }}-arm64
          provenance: false

      - name: Create multi-arch manifest
        run: |
          TAG="${{ steps.prep.outputs.tag }}"
          docker buildx imagetools create \
            -t ghcr.io/avelino/mcp:beta \
            -t ghcr.io/avelino/mcp:${TAG} \
            ghcr.io/avelino/mcp:${TAG}-amd64 \
            ghcr.io/avelino/mcp:${TAG}-arm64
